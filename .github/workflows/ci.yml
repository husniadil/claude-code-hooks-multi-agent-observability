name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Don't install git hooks in CI.
  HUSKY: 0

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # ESLint + Prettier live at the repo root and cover both apps.
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check

  client:
    name: Client (typecheck, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
        working-directory: apps/client
      # `build` runs `vue-tsc -b` (typecheck) then `vite build`.
      - run: bun run build
        working-directory: apps/client
      - run: bun test
        working-directory: apps/client

  server:
    name: Server (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
        working-directory: apps/server
      - run: bun run typecheck
        working-directory: apps/server
